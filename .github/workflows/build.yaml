on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited

permissions:
  contents: read

jobs:
  release-draft:
    permissions:
      pull-requests: write
      contents: write
      issues: write
    uses: ./.github/workflows/release-drafter.yaml
  build:
    if: failure() || cancelled()
    needs: ['release-draft']
    runs-on: ubuntu-slim
    steps:
      - run: exit 1
        name: "Catch errors"
    permissions: {}
